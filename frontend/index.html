<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Task Manager Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Partículas de fondo -->
  <div class="particles" id="particles"></div>

  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div>
        <h1>Task Manager Pro</h1>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val" id="hs-total">0</div>
        <div class="hstat-lbl">Total</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" style="color:var(--amber)" id="hs-pend">0</div>
        <div class="hstat-lbl">Pendientes</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" style="color:var(--green)" id="hs-done">0</div>
        <div class="hstat-lbl">Completadas</div>
      </div>
    </div>
  </header>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="showPage('tareas',this)">📋 Tareas</button>
      <button class="tab" onclick="showPage('auditoria',this)">🕐 Auditoría</button>
    </div>
  </div>

  <div class="container">

    <!-- ── PÁGINA TAREAS ── -->
    <div id="page-tareas" class="page active">

      <div class="card" style="animation-delay:.05s">
        <div class="card-header">
          <div class="card-icon purple">➕</div>
          <span class="card-title">Nueva tarea</span>
        </div>
        <div class="form-grid">
          <div class="field full"><label>Título *</label><input id="f-titulo"
              placeholder="Ej. Revisar documentación del proyecto" /></div>
          <div class="field full"><label>Descripción</label><textarea id="f-desc"
              placeholder="Detalles opcionales..."></textarea></div>
          <div class="field"><label>Asignado a *</label><input id="f-nombre" placeholder="Nombre del responsable" />
          </div>
          <div class="field"><label>Email *</label><input id="f-email" type="email" placeholder="correo@ejemplo.com" />
          </div>
          <div class="field full" style="text-align:right;margin-top:4px">
            <button class="btn btn-primary" onclick="crearTarea()">✦ Crear tarea</button>
          </div>
        </div>
      </div>

      <div class="card" style="animation-delay:.1s">
        <div class="card-header" style="justify-content: space-between;">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="card-icon green">📌</div>
            <span class="card-title">Lista de tareas</span>
          </div>
          <div class="search-bar"
            style="position:relative; width: 100%; max-width: 300px; display: flex; gap: 8px; align-items: stretch;">
            <input id="buscador-tareas" class="search-input" type="text" placeholder="Buscar tarea o usuario..."
              onkeydown="if(event.key==='Enter') cargarTareas()" style="flex: 1;">
            <button class="btn btn-primary"
              style="display: flex; align-items: center; justify-content: center; padding: 0 20px; margin: 0; border-radius: 20px; box-shadow: none;"
              onclick="cargarTareas()">Buscar</button>
          </div>
        </div>
        <div id="lista-tareas">
          <div class="skeleton" style="height:20px;width:100%"></div>
          <div class="skeleton" style="height:20px;width:80%;margin-top:10px"></div>
        </div>
      </div>

      <div id="error-500" class="error-screen">
        <div class="error-code">500</div>
        <div class="error-emoji">🛸</div>
        <div class="error-msg">Algo explotó en el servidor. No es tu culpa, el universo simplemente quiso así.</div>
        <button class="error-btn" onclick="hideErrors();cargarTareas()">Reintentar</button>
      </div>
    </div>

    <!-- ── PÁGINA AUDITORÍA ── -->
    <div id="page-auditoria" class="page">
      <div class="card" style="animation-delay:.05s">
        <div class="card-header">
          <div class="card-icon purple">🕐</div>
          <span class="card-title">Historial de movimientos</span>
        </div>
        <div id="lista-auditoria">
          <div class="skeleton"></div>
          <div class="skeleton" style="width:70%"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Modal Editar -->
  <div class="modal-overlay" id="modal-editar">
    <div class="modal">
      <h3>✦ Editar tarea</h3>
      <input type="hidden" id="e-id" />
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="field"><label>Título</label><input id="e-titulo" /></div>
        <div class="field"><label>Descripción</label><textarea id="e-desc"></textarea></div>
        <div class="field"><label>Asignado a</label><input id="e-nombre" /></div>
        <div class="field"><label>Estado</label>
          <select id="e-estado">
            <option value="pendiente">⏳ Pendiente</option>
            <option value="en-progreso">🔄 En progreso</option>
            <option value="completada">✅ Completada</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="cerrarModal()"
          style="background:var(--surface2);color:var(--muted)">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="script.js"></script>
</body>

</html>
